name: Daily DHV Forecast

on:
  schedule:
    # 06:30 UTC is 07:30 or 08:30 in CZ (depending on daylight saving time)
    - cron: '30 6 * * *'
  workflow_dispatch: # Button for manual testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper-dhv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4
          playwright install chromium

      - name: Run DHV scraper and send
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper_dhv.py
