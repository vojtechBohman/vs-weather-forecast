name: Forecast AI with pages

on:
  schedule:
    # Čas je v UTC. 07:15 UTC odpovídá 08:15 našeho času (případně 09:15 letního)
    # Předpověď vychází obvykle kolem 06:50 UTC, takže takto budeme mít jistotu, že už tam je.
    # - cron: '58 6 * * *'
    # Evening run
    # - cron: '03 19 * * *'
    workflow_dispatch:
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-scraper-dhv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Using the new google-genai package
          pip install requests playwright beautifulsoup4 google-genai
          playwright install chromium

      - name: Run scraper and send
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AUSTRO_USERNAME: ${{ secrets.AUSTRO_USERNAME }}
          AUSTRO_PASSWORD: ${{ secrets.AUSTRO_PASSWORD }}
        run: python app.py
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Nahraje vše, včetně nového index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
