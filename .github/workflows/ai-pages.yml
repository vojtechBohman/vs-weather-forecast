name: Forecast AI with pages

on:
  schedule:
    # Předpověď vychází obvykle kolem 05:50 UTC
    - cron: '50 5 * * *'
    # Evening run
    # - cron: '03 19 * * *'
  workflow_dispatch:
    inputs:
      enable_translation:
        description: 'Enable AI Translation (costs API credits)'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-scraper-dhv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright beautifulsoup4 google-genai
          playwright install chromium

      - name: Run scraper and send
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AUSTRO_USERNAME: ${{ secrets.AUSTRO_USERNAME }}
          AUSTRO_PASSWORD: ${{ secrets.AUSTRO_PASSWORD }}
          ENABLE_TRANSLATION: ${{ github.event.inputs.enable_translation || 'false' }}
        run: python app.py
      
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
